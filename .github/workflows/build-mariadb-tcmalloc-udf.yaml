name: Build MariaDB tcmalloc UDF

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fc-scripts
        uses: actions/checkout@v4

      - name: Clone press repo (sparse checkout mariadb_tcmalloc_udf)
        run: |
          git clone --filter=blob:none --no-checkout --branch master https://github.com/frappe/press.git
          cd press
          git sparse-checkout init --cone
          git sparse-checkout set libs/mariadb_tcmalloc_udf
          git checkout
          cp -r libs/mariadb_tcmalloc_udf ../mariadb-tcmalloc-udf-src

      - name: Build .so files for all MariaDB versions and architectures
        run: |
          mkdir -p mariadb-tcmalloc-udf-dist
          cd mariadb-tcmalloc-udf-src

          for version in 10.4 10.6 11.8; do
            image="tcmalloc-udf-build:mariadb${version}"
            echo "==> Building for MariaDB ${version}"
            docker build \
              --build-arg "MARIADB_VERSION=${version}" \
              -t "${image}" \
              -f build.Dockerfile \
              .
            docker run --rm \
              -v "${{ github.workspace }}/mariadb-tcmalloc-udf-dist:/out" \
              "${image}"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mariadb-tcmalloc-udf-binaries
          path: mariadb-tcmalloc-udf-dist/*

  commit-and-pr:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout fc-scripts
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: mariadb-tcmalloc-udf-binaries
          path: mariadb_tcmalloc_udf/dist

      - name: Commit and push binaries
        run: |
          BRANCH="update-mariadb-tcmalloc-udf-$(date +%s)"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git checkout -b $BRANCH
          git add -f mariadb_tcmalloc_udf/dist
          git commit -m "feat(mariadb-tcmalloc-udf): Update binaries"
          git push origin $BRANCH

          echo "branch=$BRANCH" >> $GITHUB_ENV

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "feat(mariadb-tcmalloc-udf): Update binaries" \
            --body "This PR updates the \`mariadb_tcmalloc_udf/dist\` directory with fresh \`.so\` files for MariaDB 10.4, 10.6, and 11.8 (x86_64 and aarch64)." \
            --head "${{ env.branch }}" \
            --base develop
